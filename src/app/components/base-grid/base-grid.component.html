<div *ngIf="loading" class="loading">Loading data...</div>
<div class="grid-card"  dir="rtl" *ngIf="!error">
    <ag-grid-angular
      class="ag-theme-alpine"
      #agGrid
      style="width: 100%; height: 650px;"
      [style.width.%]="100"
      [style.height.px]="gridHeight"
      class="ag-theme-quartz"
      [rowData]="rowData"
      [columnDefs]="columnDefsOverride?.length ? columnDefsOverride : columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
    <!-- (paginationChanged)="onPaginationChanged($event)" -->
</div>
<div class="ag-pagination">

  <button class="ag-btn ag-btn-gery" (click)="prevPage()" [disabled]="currentPage === 1">
      قبلی
    </button>

  <span class="ag-page-info">
 صفحه {{ currentPage }} از {{ totalPages }}
  </span>

  <button class="ag-btn ag-btn-gery" (click)="nextPage()">
    بعدی
  </button>

  <select class="ag-select" [(ngModel)]="pageSize" (change)="onPageSizeChange()">
    <option [value]="10">10</option>
    <option [value]="20">20</option>
    <option [value]="50">50</option>
    <option [value]="100">100</option>
  </select>

<div *ngIf="error" class="ag-error">
  Failed to load data. Please try again later.
</div>

</div>
