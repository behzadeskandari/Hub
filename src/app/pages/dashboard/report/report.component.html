<div class="text-center d-flex flex-column align-items-center gap-3 mb-4 mt-4">
  <img src="../../../../assets/images/omidLogo.png" alt="Report Icon" style="width: 150px;">
</div>

<form class="search-bar" class="col-12" [formGroup]="searchForm" style="border:1px solid rgb(244,233,222,0.8);box-shadow:hsl(from 244 233 222 / 80%); border-radius: 8px; padding: 20px; margin-bottom: 20px;">

  <div class="col-12 text-center " dir="rtl" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-top:20px;margin-top:20px; border-radius: 8px; margin-bottom: 20px;">

    <input class="search-input" type="text" placeholder="Tracking Number" formControlName="trackingNumber">
    <input class="search-input" type="text" placeholder="RRN" formControlName="rrn">

    <select class="search-input" formControlName="status">
      <option [ngValue]="null">همه</option>
      <option [ngValue]="1">موفق</option>
      <option [ngValue]="2">ناموفق</option>
    </select>
    <input class="search-input" type="number" placeholder="حداقل مبلغ" formControlName="amountFrom">

    <input class="search-input" type="number" placeholder="حداکثر مبلغ" formControlName="amountTo">
    <div class="date-wrapper">

      <ng-persian-datepicker>
        <input [value]="fromDatePersian" (click)="openPicker('from')" class="search-input from-date-picker"
          formControlName="fromDate" placeholder="از تاریخ">
      </ng-persian-datepicker>
    </div>
    <div class=" date-wrapper">

      <ng-persian-datepicker>
        <input [value]="toDatePersian" (click)="openPicker('to')" class="search-input" formControlName="toDate"
          placeholder="تا تاریخ">
      </ng-persian-datepicker>
    </div>
  </div>
<button class="ag-btn ag-btn-export" (click)="exportToExcel()">خروجی اکسل</button>
<button class="ag-btn ag-btn-export  ag-btn-warning" (click)="exportToPdf()">خروجی PDF</button>
  <button type="button" class="ag-btn  ag-btn-primary" (click)="search()">جستجو</button>
  <button type="button" class="ag-btn  ag-btn-warning" (click)="resetFilters()">حذف فیلترها</button>

</form>
<app-base-grid [useSearch]="true" [searchModel]="searchModel" [apiUrl]="apiUrl" [columnDefsOverride]="customColumns">
</app-base-grid>
